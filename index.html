<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Kanban - Task Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo-area">
                <div class="logo-icon"><i class="fa-solid fa-list-check"></i></div>
                <div>
                    <h1>Zenith Kanban</h1>
                    <p>Streamline your workflow in real-time</p>
                </div>
            </div>
            <div class="header-actions">
                <button id="loadDemoBtn" class="btn btn-secondary"><i class="fa-solid fa-wand-magic-sparkles"></i> Load Demo</button>
                <button id="archiveBtn" class="btn btn-secondary"><i class="fa-solid fa-box-archive"></i> Archive</button>
                <button id="exportBtn" class="btn btn-secondary"><i class="fa-solid fa-download"></i> Export</button>
                <button id="themeToggleBtn" class="btn btn-icon"><i class="fa-solid fa-moon"></i></button>
            </div>
        </header>

        <section class="stats-container">
            <div class="stats-card card-total">
                <div class="stats-info">
                    <span>TOTAL TASKS</span>
                    <strong id="statTotal">0</strong>
                </div>
                <div class="stats-icon"><i class="fa-solid fa-cubes"></i></div>
            </div>
            <div class="stats-card card-progress">
                <div class="stats-info">
                    <span>IN PROGRESS</span>
                    <strong id="statProgress">0</strong>
                </div>
                <div class="stats-icon spin-icon"><i class="fa-solid fa-spinner"></i></div>
            </div>
            <div class="stats-card card-completed">
                <div class="stats-info">
                    <span>COMPLETED</span>
                    <strong id="statCompleted">0</strong>
                </div>
                <div class="stats-icon"><i class="fa-solid fa-circle-check"></i></div>
            </div>
            <div class="stats-card card-overdue">
                <div class="stats-info">
                    <span>OVERDUE</span>
                    <strong id="statOverdue">0</strong>
                </div>
                <div class="stats-icon blink-icon"><i class="fa-solid fa-circle-exclamation"></i></div>
            </div>
            <div class="stats-card card-rate">
                <div class="stats-info-rate">
                    <span>COMPLETION RATE</span>
                    <strong id="statRate">0%</strong>
                </div>
                <div class="progress-bar-wrapper">
                    <div id="statProgressFill" class="progress-bar-fill" style="width: 0%"></div>
                </div>
            </div>
        </section>

        <section class="filter-container">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search tasks... (Press '/' to focus)">
            </div>
            <div class="filter-actions">
                <div class="select-wrapper">
                    <i class="fa-solid fa-filter icon-left"></i>
                    <select id="priorityFilter">
                        <option value="All">All Priorities</option>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="select-wrapper">
                    <select id="sortBySelect">
                        <option value="newest">Date Created (Newest)</option>
                        <option value="oldest">Date Created (Oldest)</option>
                        <option value="priority">Priority</option>
                        <option value="dueDate">Due Date</option>
                    </select>
                </div>
            </div>
        </section>

        <main class="kanban-board">
            <div class="kanban-column" data-status="To Do">
                <div class="column-header">
                    <div class="column-title">
                        <span class="dot dot-todo"></span>
                        <h2>To Do</h2>
                        <span class="column-count" id="countTodo">0</span>
                    </div>
                    <button class="btn-add-task open-modal-btn" data-column="To Do"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div class="task-list" id="listTodo"></div>
            </div>

            <div class="kanban-column" data-status="In Progress">
                <div class="column-header">
                    <div class="column-title">
                        <span class="dot dot-progress"></span>
                        <h2>In Progress</h2>
                        <span class="column-count" id="countProgress">0</span>
                    </div>
                    <button class="btn-add-task open-modal-btn" data-column="In Progress"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div class="task-list" id="listProgress"></div>
            </div>

            <div class="kanban-column" data-status="Done">
                <div class="column-header">
                    <div class="column-title">
                        <span class="dot dot-done"></span>
                        <h2>Done</h2>
                        <span class="column-count" id="countDone">0</span>
                    </div>
                    <button class="btn-add-task open-modal-btn" data-column="Done"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div class="task-list" id="listDone"></div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="taskModal">
        <div class="modal-content fade-in">
            <div class="modal-header">
                <h3 id="modalTitleText">Create Task</h3>
                <button class="close-modal-btn" id="closeModalBtn">&times;</button>
            </div>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label for="taskTitle">Title</label>
                    <input type="text" id="taskTitle" placeholder="Enter title">
                    <span class="error-msg" id="titleError">Title must be at least 3 characters</span>
                </div>
                <div class="form-group">
                    <label for="taskDescription">Description</label>
                    <textarea id="taskDescription" rows="3" placeholder="Enter description"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="taskPriority">Priority</label>
                        <select id="taskPriority">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="taskDueDate">Due Date</label>
                        <input type="date" id="taskDueDate">
                        <span class="error-msg" id="dateError">Please select a due date</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="taskTags">Tags <span class="label-hint">(Type tag and press Enter)</span></label>
                    <div class="tags-input-container" id="tagsContainer">
                        <input type="text" id="taskTagsInput" placeholder="Add a tag...">
                    </div>
                </div>
                <div class="form-group">
                    <label for="taskColumn">Assigned Column</label>
                    <select id="taskColumn">
                        <option value="To Do">To Do</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Done">Done</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelModalBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveTaskBtn">Create Task</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="successModal">
        <div class="modal-content text-center scale-up">
            <div class="success-icon-circle">
                <i class="fa-solid fa-check"></i>
            </div>
            <h3>Task Created Successfully!</h3>
            <button class="btn btn-primary" id="successOkBtn" style="min-width: 100px; margin-top: 20px;">OK</button>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/board.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
