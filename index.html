<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Task Manager</title>
    
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-theme');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>

    <header class="app-header">
        <h1>Kanban Task Manager</h1>
        <div class="header-actions">
            <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
                <i class="fa-solid fa-moon"></i> Theme
            </button>
            <button id="global-add-task-btn" class="btn btn-primary main-add-btn">
                <i class="fa-solid fa-plus"></i> Add Task
            </button>
        </div>
    </header>

    <main class="app-container">
        
        <section class="dashboard-controls">
            <div class="filter-bar">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search-bar" placeholder="Search Tasks">
                </div>
                
                <div class="filter-group">
                    <select id="priority-filter">
                        <option value="all">All Priorities</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>

                <div class="filter-group">
                    <select id="sort-by">
                        <option value="created-newest">Sort By: Newest</option>
                        <option value="due-soonest">Sort By: Due Date</option>
                        <option value="priority-high">Sort By: Priority</option>
                    </select>
                </div>
                
                <button id="clear-filters-btn" class="btn btn-secondary">Clear Filters</button>
            </div>

            <div id="stats-bar" class="stats-bar">
                <div class="stat-card">
                    <span class="stat-label">Total Tasks</span>
                    <span id="stat-total" class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">In Progress</span>
                    <span id="stat-inprogress" class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Completed</span>
                    <span id="stat-completed" class="stat-value">0</span>
                </div>
                <div class="stat-card" id="stat-overdue-wrapper">
                    <span class="stat-label">Overdue</span>
                    <span id="stat-overdue" class="stat-value">0</span>
                </div>
                <div class="stat-card progress-card">
                    <span class="stat-label">Progress (<span id="progress-percent">0%</span>)</span>
                    <div class="progress-bar-container">
                        <div id="progress-bar-fill" class="progress-bar-fill"></div>
                    </div>
                </div>
            </div>
        </section>

        <nav class="responsive-tabs" id="column-tabs">
            <button class="tab-link active" data-target="todo-column">To Do</button>
            <button class="tab-link" data-target="inprogress-column">In Progress</button>
            <button class="tab-link" data-target="done-column">Done</button>
        </nav>

        <section class="kanban-board">
            <div id="todo-column" class="board-column active-tab-content">
                <div class="column-header">
                    <h2>To Do <span id="todo-count" class="count-badge">0</span></h2>
                </div>
                <div class="task-list" id="todo-tasks"></div>
            </div>

            <div id="inprogress-column" class="board-column">
                <div class="column-header">
                    <h2>In Progress <span id="inprogress-count" class="count-badge">0</span></h2>
                </div>
                <div class="task-list" id="inprogress-tasks"></div>
            </div>

            <div id="done-column" class="board-column">
                <div class="column-header">
                    <h2>Done <span id="done-count" class="count-badge">0</span></h2>
                </div>
                <div class="task-list" id="done-tasks"></div>
            </div>
        </section>
    </main>

    <div id="task-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Create Task</h3>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            <form id="task-form" novalidate>
                <input type="hidden" id="task-id">
                
                <div class="form-group">
                    <label for="task-title-input">Title</label>
                    <input type="text" id="task-title-input" placeholder="Enter title">
                    <span class="error-msg" id="error-title"></span>
                </div>

                <div class="form-group">
                    <label for="task-desc-input">Description</label>
                    <textarea id="task-desc-input" rows="3" placeholder="Enter description"></textarea>
                    <span class="error-msg" id="error-desc"></span>
                </div>

                <div class="form-group">
                    <label for="task-priority-input">Priority</label>
                    <select id="task-priority-input">
                        <option value="high">High</option>
                        <option value="medium" selected>Medium</option>
                        <option value="low">Low</option>
                    </select>
                    <span class="error-msg" id="error-priority"></span>
                </div>

                <div class="form-group">
                    <label for="task-date-input">Due Date</label>
                    <input type="date" id="task-date-input">
                    <span class="error-msg" id="error-date"></span>
                </div>

                <div class="form-group">
                    <label for="tag-input-field">Tags</label>
                    <div class="tags-input-container">
                        <div id="tags-pill-wrapper" class="tags-pill-wrapper"></div>
                        <input type="text" id="tag-input-field" placeholder="Type tag and press Enter">
                    </div>
                </div>

                <div class="form-group">
                    <label for="task-column-input">Assigned Column</label>
                    <select id="task-column-input">
                        <option value="todo">To Do</option>
                        <option value="inprogress">In Progress</option>
                        <option value="done">Done</option>
                    </select>
                    <span class="error-msg" id="error-column"></span>
                </div>

                <div class="modal-actions">
                    <button type="submit" id="save-task-btn" class="btn btn-primary">Create Task</button>
                    <button type="button" id="cancel-task-btn" class="btn btn-secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-content confirm-box">
            <h3>Delete Task?</h3>
            <p>Are you sure you want to permanently delete this task?</p>
            <div class="modal-actions">
                <button id="confirm-delete-btn" class="btn btn-danger">Delete</button>
                <button id="confirm-cancel-btn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    


    <script src="js/storage.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/board.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
